<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0d0f1a">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="ID Cards">
  <link rel="manifest" href="./manifest.json">
  <link rel="apple-touch-icon" sizes="1024x1024" href="./assets/icons/icon-1024.png">
  <link rel="apple-touch-icon" sizes="512x512" href="./assets/icons/icon-512.png">
  <link rel="apple-touch-startup-image"
    media="(device-width: 1024px) and (device-height: 1366px) and (-webkit-device-pixel-ratio: 2) and (orientation: landscape)"
    href="./assets/splash-2732x2048.png">
  <link rel="apple-touch-startup-image"
    media="(device-width: 1024px) and (device-height: 1366px) and (-webkit-device-pixel-ratio: 2) and (orientation: portrait)"
    href="./assets/splash-2048x2732.png">
  <link rel="stylesheet" href="./styles/main.css">
  <link rel="stylesheet" href="./styles/animations.css">
  <title>ID Card Factory</title>
</head>
<body style="background-color: #0d0f1a;">
  <div id="app"></div>

  <!-- Chrome overlay — pointer-events:none container lets touches pass through to #app,
       pointer-events:auto on each button makes them tappable. This pattern is required
       on iPad Safari where fixed elements as body siblings can't receive taps over
       scroll areas regardless of z-index. -->
  <div id="chrome-overlay">
    <div id="chrome-qr" class="chrome-qr" role="img" aria-label="QR code to theidcardfactory.co.uk">
      <img src="./assets/qr-code.png" alt="Visit theidcardfactory.co.uk" width="96" height="96">
      <span class="chrome-qr-label">Visit our website</span>
    </div>

    <button id="chrome-home" class="chrome-home" type="button" aria-label="Return to catalogue home">
      <span class="chrome-home-icon">&#8962;</span>
    </button>

    <button id="chrome-email" class="chrome-email" type="button" aria-label="Sign up for email updates">
      <span class="chrome-email-icon">&#9993;</span>
      <span class="chrome-email-label">Sign up here</span>
    </button>
  </div>

  <script src="./src/db.js" defer></script>
  <script src="./src/config.js" defer></script>
  <script src="./src/catalogue.js" defer></script>
  <script src="./src/sync.js" defer></script>
  <script src="./src/admin.js" defer></script>
  <script src="./src/email.js" defer></script>
  <script src="./src/router.js" defer></script>
  <script src="./src/idle.js" defer></script>
  <script src="./src/app.js" defer></script>
</body>
</html>
